<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn - Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: #0A66C2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem;
      color: #333;
    }
    p {
      color: #666;
      font-size: 0.875rem;
      margin: 0;
    }
    .error {
      color: #d32f2f;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="spinner"></div>
    </div>
    <h1>Connecting to LinkedIn</h1>
    <p>Please wait while we complete the connection...</p>
    <p class="error" id="error" style="display: none;"></p>
  </div>

  <script>
    // This page is currently not used since we're using the simple share method
    // It's here for future OAuth implementation if needed
    
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const error = urlParams.get('error');
    const errorDescription = urlParams.get('error_description');

    if (error) {
      document.getElementById('error').textContent = `Error: ${errorDescription || error}`;
      document.getElementById('error').style.display = 'block';
    } else if (code) {
      // Send the code back to the parent window
      if (window.opener) {
        window.opener.postMessage({
          type: 'linkedin-oauth-success',
          code: code
        }, window.location.origin);
      }
    } else {
      document.getElementById('error').textContent = 'No authorization code received';
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
